name: Robust Monorepo Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x] # Stick to 20.x to reduce CI time

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm' # This caches your dependencies!

    - name: Build with Memory Limits
      env:
        NODE_OPTIONS: "--max-old-space-size=8192"
      run: |
        npm install
        npx webpack --mode production
